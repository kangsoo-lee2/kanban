<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Kanban 진단 v3</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #1a1a2e; color: #eee; }
    h2 { color: #3498db; margin-bottom: 16px; }
    .step { margin: 8px 0; padding: 10px 12px; border-radius: 6px; background: #16213e; }
    .ok   { border-left: 4px solid #2ecc71; }
    .fail { border-left: 4px solid #e74c3c; }
    .info { border-left: 4px solid #3498db; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: .8rem; margin-top: 4px; color: #aaa; }
    button { padding: 8px 16px; margin: 4px; border: none; border-radius: 6px; cursor: pointer; font-size: .88rem; }
    .run { background: #3498db; color: #fff; }
    .out { background: #e74c3c; color: #fff; }
    #log { margin-top: 16px; }
  </style>
</head>
<body>
<h2>🔍 Kanban v3 진단</h2>
<button class="run" onclick="runAll()">전체 진단 실행</button>
<button class="out" onclick="doSignout()">로그아웃</button>
<div id="log"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://tfakzxaygrvvzmtgqwhr.supabase.co',
  'sb_publishable_dKRm1KtOMAV9Ow3VGI4QDQ_N87ile5h'
);
function log(msg, status='info', detail='') {
  const d = document.createElement('div');
  d.className = 'step ' + status;
  d.innerHTML = '<b>' + msg + '</b>' + (detail ? '<pre>' + (typeof detail === 'object' ? JSON.stringify(detail,null,2) : detail) + '</pre>' : '');
  document.getElementById('log').prepend(d);
}
async function doSignout() {
  await sb.auth.signOut();
  log('로그아웃 완료', 'ok');
}
async function runAll() {
  document.getElementById('log').innerHTML = '';

  // 1. 세션
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { log('❌ 세션 없음 — 로그인 필요', 'fail'); return; }
  log('✓ 세션 있음: ' + session.user.email, 'ok', { uid: session.user.id });
  const uid = session.user.id;

  // 2. boards 테이블
  const { data: b1, error: e1 } = await sb.from('boards').select('id,name').limit(5);
  if (e1) log('❌ boards SELECT 실패', 'fail', e1);
  else    log('✓ boards SELECT 성공', 'ok', b1);

  // 3. board_members 테이블
  const { data: bm, error: em } = await sb.from('board_members').select('*').eq('user_id', uid);
  if (em) log('❌ board_members SELECT 실패', 'fail', em);
  else    log('✓ board_members: ' + (bm?.length ?? 0) + '개', 'ok', bm);

  // 4. boards INSERT
  const code = Math.random().toString(36).slice(2,8).toUpperCase();
  const { data: nb, error: en } = await sb.from('boards').insert({
    owner_id: uid, name: '진단 테스트 보드', invite_code: code
  }).select().single();
  if (en) log('❌ boards INSERT 실패', 'fail', en);
  else {
    log('✓ boards INSERT 성공', 'ok', nb);

    // 5. board_members INSERT
    const { error: ebm } = await sb.from('board_members').insert({
      board_id: nb.id, user_id: uid, email: session.user.email, role: 'owner'
    });
    if (ebm) log('❌ board_members INSERT 실패', 'fail', ebm);
    else log('✓ board_members INSERT 성공', 'ok');

    // 6. cards INSERT
    const { data: nc, error: ec } = await sb.from('cards').insert({
      user_id: uid, board_id: nb.id, col: 'todo', text: '진단 카드', position: 0
    }).select().single();
    if (ec) log('❌ cards INSERT 실패', 'fail', ec);
    else    log('✓ cards INSERT 성공', 'ok', nc);

    // 7. 정리 (테스트 데이터 삭제)
    if (nc) await sb.from('cards').delete().eq('id', nc.id);
    await sb.from('boards').delete().eq('id', nb.id);
    log('🧹 테스트 데이터 정리 완료', 'info');
  }

  // 8. 기존 cards (board_id NULL)
  const { data: oldCards, error: eo } = await sb.from('cards').select('id,col,text,board_id').eq('user_id', uid).is('board_id', null);
  if (eo) log('❌ 기존 cards(NULL board_id) 조회 실패', 'fail', eo);
  else    log('✓ NULL board_id 카드: ' + (oldCards?.length ?? 0) + '개', 'ok', oldCards?.slice(0,3));

  // 9. activity_log 테이블
  const { error: eal } = await sb.from('activity_log').select('id').limit(1);
  if (eal) log('❌ activity_log SELECT 실패', 'fail', eal);
  else     log('✓ activity_log 테이블 존재', 'ok');

  log('━━━ 진단 완료 ━━━', 'info');
}
</script>
</body>
</html>
