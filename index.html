<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>칸반 보드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 인증 화면 -->
<div id="auth-section">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 40 40" width="48" height="48" fill="none">
        <rect width="40" height="40" rx="10" fill="#3498db"/>
        <rect x="8" y="10" width="7" height="20" rx="2" fill="white" opacity="0.9"/>
        <rect x="17" y="10" width="7" height="20" rx="2" fill="white" opacity="0.7"/>
        <rect x="26" y="10" width="7" height="12" rx="2" fill="white" opacity="0.5"/>
      </svg>
    </div>
    <h1 class="auth-title">칸반 보드</h1>
    <p class="auth-subtitle">로그인하여 작업을 관리하세요</p>

    <div class="oauth-buttons">
      <button class="oauth-btn google-btn" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24" width="20" height="20" class="oauth-icon">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google로 계속하기
      </button>

      <button class="oauth-btn github-btn" onclick="signInWithGitHub()">
        <svg viewBox="0 0 24 24" width="20" height="20" class="oauth-icon" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub로 계속하기
      </button>
    </div>

    <div class="divider"><span>또는 이메일로</span></div>

    <div class="email-form">
      <input type="email" id="email-input" placeholder="이메일 주소" autocomplete="email" />
      <input type="password" id="password-input" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" />
      <div class="auth-actions">
        <button class="auth-btn primary-btn" onclick="handleEmailLogin()">로그인</button>
        <button class="auth-btn secondary-btn" onclick="handleEmailSignup()">회원가입</button>
      </div>
    </div>

    <div id="auth-message" class="auth-message" hidden></div>
  </div>
</div>

<!-- 칸반 보드 화면 -->
<div id="board-section" hidden>
  <header class="app-header">
    <div class="header-left">
      <svg viewBox="0 0 40 40" width="32" height="32" fill="none">
        <rect width="40" height="40" rx="8" fill="#3498db"/>
        <rect x="7" y="9" width="7" height="22" rx="2" fill="white" opacity="0.9"/>
        <rect x="17" y="9" width="7" height="22" rx="2" fill="white" opacity="0.7"/>
        <rect x="27" y="9" width="7" height="14" rx="2" fill="white" opacity="0.5"/>
      </svg>
      <h1>칸반 보드</h1>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="user-avatar"></div>
      <span class="user-email" id="user-email"></span>
      <button class="signout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </header>

  <div class="board" id="board">

    <div class="column" data-col="todo">
      <div class="column-header">
        <span class="column-title">To-Do</span>
        <span class="badge" id="badge-todo">0</span>
      </div>
      <div class="card-list" id="list-todo"></div>
      <div class="add-area">
        <textarea id="input-todo" placeholder="새 할 일 입력..."></textarea>
        <button class="add-btn" onclick="addCard('todo')">+ 추가</button>
      </div>
    </div>

    <div class="column" data-col="inprogress">
      <div class="column-header">
        <span class="column-title">In-Progress</span>
        <span class="badge" id="badge-inprogress">0</span>
      </div>
      <div class="card-list" id="list-inprogress"></div>
      <div class="add-area">
        <textarea id="input-inprogress" placeholder="진행 중인 작업 입력..."></textarea>
        <button class="add-btn" onclick="addCard('inprogress')">+ 추가</button>
      </div>
    </div>

    <div class="column" data-col="done">
      <div class="column-header">
        <span class="column-title">Done</span>
        <span class="badge" id="badge-done">0</span>
      </div>
      <div class="card-list" id="list-done"></div>
      <div class="add-area">
        <textarea id="input-done" placeholder="완료된 작업 입력..."></textarea>
        <button class="add-btn" onclick="addCard('done')">+ 추가</button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
